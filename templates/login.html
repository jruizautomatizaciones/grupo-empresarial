<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Acceso — Grupo Empresarial</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:linear-gradient(135deg,#0a2463 0%,#1a1a3e 50%,#0d1b4b 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 50%,rgba(30,77,183,.15) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(244,161,0,.08) 0%,transparent 40%);pointer-events:none;}
.wrap{width:420px;position:relative;z-index:1;}
.logo{text-align:center;margin-bottom:40px;}
.logo-sub{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:6px;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:14px;}
.logo-tit{font-size:28px;font-weight:800;color:white;letter-spacing:-0.5px;}
.logo-tit span{color:#f4a100;}
.logo-desc{color:rgba(255,255,255,.4);font-size:12px;margin-top:8px;font-weight:300;}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:36px;backdrop-filter:blur(20px);box-shadow:0 24px 48px rgba(0,0,0,.3);}
label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.5);margin-bottom:8px;}
input{width:100%;padding:13px 16px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:10px;color:white;font-family:'Sora',sans-serif;font-size:14px;outline:none;transition:.2s;}
input::placeholder{color:rgba(255,255,255,.2);}
input:focus{border-color:rgba(244,161,0,.6);background:rgba(255,255,255,.08);}
.campo{margin-bottom:20px;}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#f4a100,#e09000);border:none;border-radius:10px;color:#1a1a2e;font-size:14px;font-weight:700;font-family:'Sora',sans-serif;cursor:pointer;letter-spacing:.3px;transition:.2s;margin-top:8px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(244,161,0,.4);}
.error{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.4);border-radius:8px;padding:10px 14px;color:#ff8a80;font-size:12px;margin-bottom:20px;}
.chips{display:flex;gap:8px;justify-content:center;margin-top:28px;}
.chip{padding:4px 12px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-sub">Panel Empresarial · Acceso Seguro</div>
    <div class="logo-tit">Grupo <span>Bombeos</span></div>
    <div class="logo-desc">Sistema de gestion unificado</div>
  </div>
  <div class="card">
    {% if error %}<div class="error">&#9888; {{ error }}</div>{% endif %}
    <form method="post">
      <div class="campo">
        <label>Usuario</label>
        <input type="text" name="usuario" placeholder="tu usuario" autofocus>
      </div>
      <div class="campo">
        <label>Contrasena</label>
        <input type="password" name="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
      </div>
      <button type="submit" class="btn">ENTRAR &rarr;</button>
    </form>
  </div>
  <div class="chips">
    <span class="chip">EXALBOM</span>
    <span class="chip">IBES</span>
    <span class="chip">COSTA</span>
    <span class="chip">LUSO</span>
  </div>
</div>
</body>
</html>
