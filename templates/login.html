<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Acceso — Grupo Empresarial</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:linear-gradient(135deg,#0a1628 0%,#0d1f3c 50%,#0a1628 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 15% 50%,rgba(30,77,183,.12) 0%,transparent 45%),radial-gradient(circle at 85% 20%,rgba(244,161,0,.06) 0%,transparent 40%);pointer-events:none;}
.wrap{width:440px;position:relative;z-index:1;}
.logo-area{text-align:center;margin-bottom:44px;}
.grupo-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:6px;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:18px;}
.grupo-nombre{font-size:13px;font-weight:700;color:rgba(255,255,255,.9);letter-spacing:4px;text-transform:uppercase;margin-bottom:6px;}
.grupo-desc{color:rgba(255,255,255,.3);font-size:11px;font-weight:300;letter-spacing:1px;}
.linea{width:40px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);margin:16px auto;}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:40px;backdrop-filter:blur(24px);box-shadow:0 32px 64px rgba(0,0,0,.4);}
label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;color:rgba(255,255,255,.35);margin-bottom:10px;}
input{width:100%;padding:14px 18px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:white;font-family:'Sora',sans-serif;font-size:14px;outline:none;transition:.2s;}
input::placeholder{color:rgba(255,255,255,.15);}
input:focus{border-color:rgba(244,161,0,.5);background:rgba(255,255,255,.07);}
.campo{margin-bottom:22px;}
.btn{width:100%;padding:15px;background:linear-gradient(135deg,#e09000,#f4a100);border:none;border-radius:12px;color:#0a1628;font-size:13px;font-weight:800;font-family:'Sora',sans-serif;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:.2s;margin-top:6px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(244,161,0,.35);}
.btn:active{transform:translateY(0);}
.error{background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.3);border-radius:10px;padding:12px 16px;color:#ff8a80;font-size:12px;margin-bottom:22px;}
.footer{text-align:center;margin-top:28px;color:rgba(255,255,255,.15);font-size:10px;letter-spacing:1px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-area">
    <div class="grupo-label">Sistema de Gestion</div>
    <div class="grupo-nombre">Grupo Empresarial</div>
    <div class="grupo-desc">Acceso unificado &middot; Area privada</div>
    <div class="linea"></div>
  </div>
  <div class="card">
    {% if error %}<div class="error">&#9888; {{ error }}</div>{% endif %}
    <form method="post">
      <div class="campo">
        <label>Usuario</label>
        <input type="text" name="usuario" placeholder="Introduce tu usuario" autofocus autocomplete="username">
      </div>
      <div class="campo">
        <label>Contrasena</label>
        <input type="password" name="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password">
      </div>
      <button type="submit" class="btn">Acceder &rarr;</button>
    </form>
  </div>
  <div class="footer">Acceso restringido &middot; Solo personal autorizado</div>
</div>
</body>
</html>
