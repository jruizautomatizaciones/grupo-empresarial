<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Grupo Empresarial</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* ONDAS FIJAS */
.onda { position: fixed; pointer-events: none; z-index: 0; }
.onda-tl { top: 0; left: 0; }
.onda-br { bottom: 0; right: 0; }

/* CONTENIDO */
.contenido {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; width: 100%;
}

/* CABECERA */
.cabecera { text-align: center; margin-bottom: 30px; }
.titulo-grupo {
  font-size: 42px; font-weight: 900;
  color: #8b0000; letter-spacing: 3px;
  text-transform: uppercase;
}
.subtitulo-grupo {
  font-size: 11px; letter-spacing: 6px;
  color: #777; text-transform: uppercase;
  margin-top: 6px;
}
.linea-deco {
  display: flex; align-items: center;
  justify-content: center; gap: 8px;
  margin-top: 14px;
}
.linea-deco .l { width: 55px; height: 2px; background: #8b0000; border-radius: 2px; }
.linea-deco .p { width: 9px; height: 9px; background: #ff8800; border-radius: 50%; }

/* TARJETA */
.card {
  background: white;
  border-radius: 18px;
  padding: 42px 48px;
  width: 430px;
  box-shadow: 0 20px 60px rgba(0,0,0,.10);
}
.card-titulo {
  font-size: 26px; font-weight: 700;
  color: #8b0000; text-align: center; margin-bottom: 4px;
}
.card-sub {
  font-size: 13px; color: #999;
  text-align: center; margin-bottom: 30px;
}

/* ERROR */
.error-box {
  background: #fff5f5; border: 1px solid #f5c6c6;
  border-left: 3px solid #8b0000; border-radius: 8px;
  padding: 10px 14px; color: #8b0000;
  font-size: 12px; margin-bottom: 18px;
}

/* CAMPOS */
.campo { margin-bottom: 22px; }
.campo-label {
  font-size: 11px; font-weight: 800;
  letter-spacing: 2px; color: #333;
  text-transform: uppercase; margin-bottom: 9px;
  display: block;
}
.input-wrap {
  display: flex; align-items: center;
  border: 1.5px solid #e8e8e8;
  border-radius: 10px; background: white;
  transition: .2s;
}
.input-wrap:focus-within {
  border-color: #8b0000;
  box-shadow: 0 0 0 3px rgba(139,0,0,.07);
}
.input-icon { padding: 0 14px; font-size: 18px; color: #8b0000; flex-shrink:0; }
.input-wrap input {
  flex:1; padding: 14px 8px 14px 0;
  border: none; outline: none;
  font-size: 14px; color: #333;
  font-family: Arial, sans-serif;
  background: transparent;
}
.input-wrap input::placeholder { color: #ccc; }
.toggle-pwd {
  padding: 0 14px; cursor: pointer;
  font-size: 17px; color: #bbb;
}
.toggle-pwd:hover { color: #8b0000; }

/* BOTÓN */
.btn {
  width: 100%; padding: 16px;
  background: #8b0000;
  border: none; border-radius: 10px;
  color: white; font-size: 14px;
  font-weight: 800; letter-spacing: 2px;
  text-transform: uppercase; cursor: pointer;
  transition: .2s; margin-top: 6px;
  font-family: Arial, sans-serif;
}
.btn:hover {
  background: #700000;
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(139,0,0,.25);
}

/* LINEA PIE */
.linea-inf {
  display: flex; align-items: center;
  gap: 8px; margin: 24px 0 16px;
}
.linea-inf .l { flex:1; height:1px; background:#eeeeee; }
.linea-inf .p { width:9px; height:9px; background:#ff8800; border-radius:50%; flex-shrink:0; }

/* FOOTER */
.footer { font-size: 12px; text-align: center; color: #aaa; }
.footer .jrc { color: #c8960c; font-weight: 900; letter-spacing: 1px; }
.footer .resto { color: #555; font-weight: 700; }
</style>
</head>
<body>

<!-- ONDA SUPERIOR IZQUIERDA -->
<svg class="onda onda-tl" width="340" height="280" viewBox="0 0 340 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gtl1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7a0000"/>
      <stop offset="50%" stop-color="#cc1100"/>
      <stop offset="100%" stop-color="#ff7700"/>
    </linearGradient>
    <linearGradient id="gtl2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
  </defs>
  <!-- Onda roja principal -->
  <path d="M0,0 L340,0 C280,0 200,20 160,80 C120,140 60,180 0,160 Z" fill="url(#gtl1)"/>
  <!-- Onda naranja secundaria -->
  <path d="M0,0 L200,0 C160,0 100,30 70,80 C40,130 10,150 0,130 Z" fill="url(#gtl2)" opacity="0.85"/>
  <!-- Highlight blanco -->
  <path d="M0,0 L120,0 C90,0 50,20 30,55 C10,85 0,100 0,85 Z" fill="white" opacity="0.08"/>
</svg>

<!-- ONDA INFERIOR DERECHA -->
<svg class="onda onda-br" width="340" height="280" viewBox="0 0 340 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gbr1" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7a0000"/>
      <stop offset="50%" stop-color="#cc1100"/>
      <stop offset="100%" stop-color="#ff7700"/>
    </linearGradient>
    <linearGradient id="gbr2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
  </defs>
  <path d="M340,280 L0,280 C60,280 140,260 180,200 C220,140 280,100 340,120 Z" fill="url(#gbr1)"/>
  <path d="M340,280 L140,280 C180,280 240,250 270,200 C300,150 330,130 340,150 Z" fill="url(#gbr2)" opacity="0.85"/>
  <path d="M340,280 L220,280 C250,280 290,260 310,225 C330,195 340,180 340,195 Z" fill="white" opacity="0.08"/>
</svg>

<div class="contenido">

  <!-- CABECERA -->
  <div class="cabecera">
    <div class="titulo-grupo">Grupo Empresarial</div>
    <div class="subtitulo-grupo">Soluciones en Bombeo Industrial</div>
    <div class="linea-deco">
      <div class="l"></div>
      <div class="p"></div>
      <div class="l"></div>
    </div>
  </div>

  <!-- TARJETA -->
  <div class="card">
    <div class="card-titulo">Bienvenido</div>
    <div class="card-sub">Inicie sesi&oacute;n para continuar</div>

    {% if error %}
    <div class="error-box">&#9888; {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="campo">
        <label class="campo-label">Usuario</label>
        <div class="input-wrap">
          <span class="input-icon">&#128100;</span>
          <input type="text" name="usuario" placeholder="Ingrese su usuario" autofocus autocomplete="username">
        </div>
      </div>
      <div class="campo">
        <label class="campo-label">Contrase&ntilde;a</label>
        <div class="input-wrap">
          <span class="input-icon">&#128274;</span>
          <input type="password" name="password" id="pwd" placeholder="Ingrese su contrase&ntilde;a" autocomplete="current-password">
          <span class="toggle-pwd" onclick="togglePwd()">&#128065;</span>
        </div>
      </div>
      <button type="submit" class="btn">Iniciar Sesi&oacute;n</button>
    </form>

    <div class="linea-inf">
      <div class="l"></div>
      <div class="p"></div>
      <div class="l"></div>
    </div>

    <div class="footer">
      Desarrollado por <span class="jrc">JRC</span><span class="resto"> AUTOMATIZACIONES</span>
    </div>
  </div>

</div>

<script>
function togglePwd() {
  const p = document.getElementById('pwd');
  p.type = p.type === 'password' ? 'text' : 'password';
}
</script>

</body>
</html>
