<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Grupo Empresarial</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f4f4f4, #eaeaea);
}

.bg-top {
    position: absolute;
    top: 0; left: 0;
    width: 300px; height: 200px;
    background: linear-gradient(45deg, #b30000, #ff9900);
    border-bottom-right-radius: 200px;
}

.bg-bottom {
    position: absolute;
    bottom: 0; right: 0;
    width: 300px; height: 200px;
    background: linear-gradient(45deg, #b30000, #ff9900);
    border-top-left-radius: 200px;
}

.container {
    position: relative;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: #fff;
    padding: 40px;
    border-radius: 12px;
    width: 370px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    text-align: center;
    position: relative;
    z-index: 1;
}

.logo-area {
    margin-bottom: 8px;
}

.title {
    font-size: 22px;
    font-weight: bold;
    color: #b30000;
    letter-spacing: 1px;
}

.subtitle {
    font-size: 11px;
    color: #888;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
}

.divider {
    width: 40px; height: 3px;
    background: linear-gradient(45deg, #b30000, #ff9900);
    border-radius: 2px;
    margin: 10px auto 20px;
}

.error-box {
    background: #fff5f5;
    border: 1px solid #f5c6c6;
    border-left: 3px solid #b30000;
    border-radius: 6px;
    padding: 10px 14px;
    color: #b30000;
    font-size: 12px;
    margin-bottom: 16px;
    text-align: left;
}

.label {
    text-align: left;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 1px;
    margin-top: 14px;
    margin-bottom: 5px;
    color: #555;
    text-transform: uppercase;
}

.input {
    width: 100%;
    padding: 11px 14px;
    border-radius: 6px;
    border: 1.5px solid #ddd;
    font-size: 14px;
    transition: .2s;
    outline: none;
    box-sizing: border-box;
}

.input:focus {
    border-color: #b30000;
    box-shadow: 0 0 0 3px rgba(179,0,0,.08);
}

.button {
    margin-top: 22px;
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 6px;
    background: linear-gradient(45deg, #b30000, #990000);
    color: white;
    font-weight: bold;
    font-size: 13px;
    letter-spacing: 1.5px;
    cursor: pointer;
    text-transform: uppercase;
    transition: .2s;
}

.button:hover {
    opacity: 0.88;
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(179,0,0,.3);
}

.empresas {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin: 18px 0 4px;
}

.emp {
    font-size: 9px;
    font-weight: bold;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid #eee;
    color: #999;
    text-transform: uppercase;
}

.footer {
    margin-top: 20px;
    font-size: 10px;
    color: #bbb;
    letter-spacing: .5px;
}

.footer strong {
    color: #b30000;
}
</style>
</head>
<body>

<div class="bg-top"></div>
<div class="bg-bottom"></div>

<div class="container">
  <div class="card">

    <div class="logo-area">
      <div class="title">GRUPO EMPRESARIAL</div>
      <div class="subtitle">Soluciones en Bombeo Industrial</div>
      <div class="divider"></div>
    </div>

    {% if error %}
    <div class="error-box">&#9888; {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="label">Usuario</div>
      <input class="input" name="usuario" placeholder="Ingrese su usuario" autofocus autocomplete="username">

      <div class="label">Contrase&ntilde;a</div>
      <input class="input" type="password" name="password" placeholder="Ingrese su contrase&ntilde;a" autocomplete="current-password">

      <button class="button">Iniciar Sesi&oacute;n</button>
    </form>

    <div class="empresas">
      <span class="emp" style="border-color:#1e4db7;color:#1e4db7;">EXALBOM</span>
      <span class="emp" style="border-color:#c0392b;color:#c0392b;">IBES</span>
      <span class="emp" style="border-color:#16a085;color:#16a085;">COSTA</span>
      <span class="emp" style="border-color:#8e44ad;color:#8e44ad;">LUSO</span>
      <span class="emp" style="border-color:#d35400;color:#d35400;">INFAMEVI</span>
      <span class="emp" style="border-color:#27ae60;color:#27ae60;">BOMMESA</span>
    </div>

    <div class="footer">
      Desarrollado por <strong>JRC AUTOMATIZACIONES</strong>
    </div>

  </div>
</div>

</body>
</html>
